id: clifford_beers_society_cbs_affil
title: 'Clifford Beers Society (CBS) Affiliate Membership Application'
description: ''
categories:
  - Affiliation
elements: |-
  cbs_header_text:
    '#type': webform_markup
    '#display_on': both
    '#markup': |-
      <p>Thank you for your interest in the Clifford Beers Society (CBS) Affiliate Membership. Please complete the application below. Once the application is completed and submitted, MHA will contact you regarding the next steps of the application process.</p>

      <p>Questions: Contact MHA&rsquo;s Valerie Sterns at (703) 797- 2594 or at vsterns@mhanational.org.</p>
      <quillbot-extension-portal></quillbot-extension-portal>
  affiliate_name:
    '#type': textfield
    '#title': 'Affiliate Name'
    '#prepopulate': true
    '#required': true
    '#required_error': 'Affiliate Name is Required'
    '#default_value': '[current-user:field_affiliate_name]'
    '#access_create_roles':
      - authenticated
    '#access_update_roles':
      - authenticated
    '#access_view_roles':
      - authenticated
  primary_contact_name:
    '#type': textfield
    '#title': 'Primary Contact Name'
    '#required': true
    '#required_error': 'Primary Contact Name is required.'
  mailing_address:
    '#type': fieldset
    '#title': 'Mailing Address'
    address_line_1:
      '#type': textfield
      '#title': 'Address Line 1'
      '#default_value': '[current-user:field_affiliate_address:address_line1]'
      '#required': true
    address_line_2:
      '#type': textfield
      '#title': 'Address Line 2'
      '#default_value': '[current-user:field_affiliate_address:address_line2]'
    city:
      '#type': textfield
      '#title': City
      '#default_value': '[current-user:field_affiliate_address:locality]'
      '#required': true
    state:
      '#type': textfield
      '#title': State
      '#default_value': '[current-user:field_affiliate_address:administrative_area]'
      '#required': true
    zip_code:
      '#type': textfield
      '#title': 'Zip Code'
      '#default_value': '[current-user:field_affiliate_address:postal_code]'
      '#required': true
  business_phone:
    '#type': tel
    '#title': 'Business Phone'
    '#required': true
    '#required_error': 'Business Phone is required.'
    '#default_value': '[current-user:field_phone]'
  business_email:
    '#type': email
    '#title': 'Business Email'
    '#required': true
    '#required_error': 'Business Email is required.'
    '#default_value': '[current-user:field_affiliate_email]'
  website:
    '#type': textfield
    '#title': Website
    '#default_value': '[current-user:field_website:uri]'
