elements: |-
  welcome_section:
    '#type': details
    '#title': Welcome
    '#open': true
    welcome_text:
      '#type': processed_text
      '#display_on': both
      '#text': |
        <p>Becoming an MHA Affiliate means becoming part of a legacy of over one hundred years of positive change for people with mental health conditions.&nbsp;</p>

        <p>Once an organization becomes an MHA Affiliate, it participates in a periodic re-affiliation process to ensure its continued adherence to the standards of affiliation.&nbsp;</p>

        <p>The re-affiliation process consists of:</p>

        <ul>
        	<li>a thorough self-evaluation completed by the affiliate;</li>
        	<li>review of that evaluation by members of Mental Health America’s Affiliate Relations Committee; and</li>
        	<li>a vote by Mental Health America’s Board of Directors to determine the health-rating of the organization and period for which the re-affiliation will be effective.</li>
        </ul>

        <p>Sample documents for ease of use:</p>

        <ul>
        	<li><a href="/sites/default/files/Financial%20Contingency%20Plan.pdf">Financial Contingency Plan</a>

        	<ul>
        		<li><a href="/sites/default/files/Sample%20Financial%20Contingency%20Plan.pdf">Sample Financial Contingency Plan</a></li>
        		<li><a href="/sites/default/files/Sample%20SWOT%20Template.xlsx">SWOT Analysis Template</a>&nbsp;</li>
        	</ul>
        	</li>
        	<li><a href="/sites/default/files/A%20Blueprint%20for%20Emergency%20Preparedness%20by%20Nonprofits.pdf">Sample Emergency Preparedness Plan Blueprint</a>&nbsp;
        	<ul>
        		<li><a href="/sites/default/files/Business-Continuity-and-Disaster-Recovery-Plan-Free-PDF-Template.pdf">Sample Business Continuity and Disaster Recovery Plan</a></li>
        	</ul>
        	</li>
        	<li><a href="/sites/default/files/Sample%20Cultural%20Competency%20_Plan_Statement.pdf">Sample Cultural Competency Plan and Statement</a></li>
        	<li><a href="https://www.d5coalition.org/wp-content/uploads/2014/02/DEI-Self-Assessment-10.28.13.pdf">Sample DEI Self-Assessment</a></li>
        	<li><a href="https://www.thecentermsu.org/uploads/editor/files/Complete_Comprehensive_DEI_Assessment.pdf">Sample DEI Self-Assessment</a></li>
        </ul>
      '#format': basic_html
