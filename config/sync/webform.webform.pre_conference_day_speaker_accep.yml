id: pre_conference_day_speaker_accep
title: 'Pre-Conference Day Speaker Acceptance Form'
description: ''
categories: {  }
elements: |-
  markup1:
    '#type': webform_markup
    '#display_on': both
    '#markup': |
      <p>Congratulations! Your abstract&nbsp;has been selected for presentation at MHA&rsquo;s Pre-Conference Day. Pre-Conference Day is scheduled to be held on Wednesday, June 9, 2021, as a hybrid event&mdash;in-person sessions&nbsp;at the&nbsp;<a href="https://www.hyatt.com/en-US/group-booking/WASRW/G-MEHA" target="_blank">Hyatt Regency Washington on Capitol Hill</a>&nbsp;and virtual sessions pre-recorded and live-streamed.</p>
      
      <p>IMPORTANT NOTE:</p>
      
      <p>Please Accept or Decline this invitation to speak at Pre-Conference Day by clicking the &quot;Accept&quot; or &quot;Decline&quot; buttons below. Your response must be received no later than COB Wednesday, March&nbsp;31, 2021. If you decide to &quot;Decline&quot; this invitation, your presentation will be withdrawn.</p>
  accept_decline:
    '#type': radios
    '#title': Accept/Decline
    '#options':
      Accept: 'I accept the invitation to speak at Pre-Conference Day 2021.'
      Decline: 'I decline the invitation to speak at Pre-Conference Day 2021.'
    '#required': true
  presentation_title:
    '#type': textfield
    '#title': 'Presentation Title'
    '#title_display': inline
    '#placeholder': 'Presentation Title'
    '#autocomplete': 'off'
    '#readonly': true
    '#prepopulate': true
  speaker_name:
    '#type': textfield
    '#title': 'Speaker(s) Name'
    '#title_display': inline
    '#placeholder': 'Full Name'
    '#autocomplete': 'off'
    '#readonly': true
    '#prepopulate': true
  markup2:
    '#type': webform_markup
    '#markup': |
      Registration: As a presenter, you will receive <strong>one complimentary registration</strong> to attend the MHA Annual Conference, which includes Pre-Conference Day. Only the presenters listed on the Call for Proposals&nbsp;form are eligible to receive the comp registration. No additional staff can be added.<br />
      <br />
      You will receive a link to register for the MHA Annual Conference and Pre-Conference Day once registration opens. Logistics and other details will be forthcoming.&nbsp;<br />
      <br />
      Should you have any questions, feel free to contact MHA&rsquo;s Valerie Sterns at <a href="http://vsterns@mhanational.org">vsterns@mhanational.org</a>&nbsp;or at (703) 797-2594.
      
  actions:
    '#type': webform_actions
    '#title': 'Submit button(s)'
    '#states':
      visible:
        ':input[name="accept_decline"]':
          checked: true
    '#submit__label': Submit
